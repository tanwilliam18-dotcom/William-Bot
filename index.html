  .modal h2 {
    font-size: 17px; font-weight: 700; color: #1a3a5c;

</style>

  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

      method: "POST",
      headers: { "xi-api-key": EL_API_KEY, "Content-Type": "application/json" },

        model_id: EL_MODEL,
        voice_settings: { stability: 0.55, similarity_boost: 0.80, style: 0.2, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error("EL " + res.status);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { setSpeaking(false); URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { setSpeaking(false); };
    // Play with user-gesture-aware promise handling
    const playPromise = currentAudio.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // Autoplay blocked - fall through to browser TTS
        console.info("Autoplay blocked, switching to browser TTS");
        setSpeaking(false);
        speakBrowser(text);
      });
    }
  } catch(err) {
    // ElevenLabs quota exhausted or unavailable - silently fall back to browser TTS
    console.info("ElevenLabs unavailable (" + err.message + "), switching to browser TTS");
    speakBrowser(text);
  }
}

function initCanvas() {
  const canvas = document.getElementById('avatarCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  CANVAS_IMG.onload = () => {
    requestAnimationFrame(() => animateAvatar(ctx, canvas));
  };
  if (CANVAS_IMG.complete) {
    requestAnimationFrame(() => animateAvatar(ctx, canvas));
  }

  // Click to wave/greet
  canvas.addEventListener('click', () => {
    triggerGreeting();
  });
}

let greetingActive = false;
let greetingFrame = 0;

function triggerGreeting() {
  greetingActive = true;
  greetingFrame = 0;
}

function animateAvatar(ctx, canvas) {
  const W = canvas.width;  // 108
  const H = canvas.height; // 108
  const cx = W / 2;        // 54
  const cy = H / 2;        // 54
  const R  = 50;           // face clip radius

  ctx.clearRect(0, 0, W, H);
  frameCount++;

  // ── Idle head bob ──────────────────────────────────────────
  headBob += 0.012 * headBobDir;
  if (Math.abs(headBob) > 1.5) headBobDir *= -1;
  const bobY = isSpeaking ? headBob * 2.2 : headBob;

  // ── Greeting bounce ────────────────────────────────────────
  let greetBounce = 0;
  if (greetingActive) {
    greetingFrame++;
    greetBounce = Math.sin(greetingFrame * 0.25) * 7 * Math.max(0, 1 - greetingFrame/60);
    if (greetingFrame > 80) greetingActive = false;
  }

  // ── Outer glow ring ────────────────────────────────────────
  const glowAlpha = isSpeaking
    ? 0.5 + Math.sin(frameCount * 0.15) * 0.35
    : 0.2 + Math.sin(frameCount * 0.04) * 0.12;
  const glowColor = isSpeaking
    ? `rgba(74,222,128,${glowAlpha})`
    : `rgba(255,255,255,${glowAlpha})`;
  const glowSize = isSpeaking
    ? R + 2 + Math.sin(frameCount * 0.18) * 4
    : R + 2 + Math.sin(frameCount * 0.04) * 2;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, glowSize, 0, Math.PI * 2);
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = isSpeaking ? 3 : 2;
  ctx.stroke();
  if (isSpeaking) {
    ctx.beginPath();
    ctx.arc(cx, cy, glowSize + 6, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(74,222,128,${glowAlpha * 0.4})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.restore();

  // ── Draw photo clipped to circle ───────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();
  const scale = isSpeaking ? 1.0 + Math.sin(frameCount * 0.12) * 0.006 : 1.0;
  const drawSize = (R * 2) * scale;
  const offset = (R * 2 - drawSize) / 2;
  ctx.drawImage(CANVAS_IMG, offset, offset + bobY + greetBounce, drawSize, drawSize);
  ctx.restore();

  // ── Photo border ───────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = isSpeaking ? 'rgba(74,222,128,0.85)' : 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.restore();

  // ── Eye blink ──────────────────────────────────────────────
  // In 108px canvas, face fills 100px circle centred at 54,54
  // Eyes sit at approx y=39 (36% from top of face)
  blinkTimer++;
  if (blinkTimer >= nextBlinkAt && blinkState === 0) {
    blinkState = 1; blinkFrame = 0;
    nextBlinkAt = blinkTimer + (isSpeaking ? 80 + Math.random()*70 : 160 + Math.random()*160);
  }
  if (blinkState > 0) {
    blinkFrame++;
    let blinkH = 0;
    if      (blinkState === 1) { blinkH = Math.min(blinkFrame / 3, 1); if (blinkFrame >= 3) { blinkState = 2; blinkFrame = 0; } }
    else if (blinkState === 2) { blinkH = 1;                           if (blinkFrame >= 4) { blinkState = 3; blinkFrame = 0; } }
    else if (blinkState === 3) { blinkH = Math.max(0, 1 - blinkFrame / 3); if (blinkFrame >= 3) { blinkState = 0; blinkFrame = 0; blinkTimer = 0; } }
    if (blinkH > 0) {
      const eyeY  = 39 + bobY + greetBounce;
      const eyeH  = 8 * blinkH;   // taller strip = more visible blink
      const eyeX  = cx - R + 4;   // left edge of face
      const eyeW  = (R * 2) - 8;  // full eye strip width
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = `rgba(30,20,10,${0.65 * blinkH})`;
      ctx.fillRect(eyeX, eyeY - eyeH / 2, eyeW, eyeH);
      ctx.restore();
    }
  }

  // ── Speaking indicator: external rings only, nothing on face ──
  if (isSpeaking) {
    // Animated arc around the bottom of the avatar to suggest speech rhythm
    const arcPulse = Math.abs(Math.sin(frameCount * 0.28));
    const arcAlpha = 0.4 + arcPulse * 0.5;
    const arcR = R + 5 + arcPulse * 4;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, arcR, Math.PI * 0.3, Math.PI * 0.7);
    ctx.strokeStyle = `rgba(74,222,128,${arcAlpha})`;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
    // Pulsing dot below
    const dotA = 0.6 + Math.sin(frameCount * 0.35) * 0.4;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, H - 5, 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(74,222,128,${dotA})`;
    ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(() => animateAvatar(ctx, canvas));
}

/* ── CLAUDE API ── */
async function callClaude(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });
  const data = await response.json();
  const reply = data.content?.map(b => b.text || "").join("") || "I'm sorry, I couldn't process that right now.";
  conversationHistory.push({ role: "assistant", content: reply });
  return reply;
}

function formatClaudeReply(text) {
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = escaped
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/Situation:/gi, '<span class="star-label">Situation</span>')
    .replace(/Task:/gi,      '<span class="star-label">Task</span>')
    .replace(/Action:/gi,    '<span class="star-label">Action</span>')
    .replace(/Result:/gi,    '<span class="star-label">Result</span>');
  html = html.split(/\n\n+/).map(p => p.trim() ? `<p>${p.replace(/\n/g,' ')}</p>` : '').join('');
  const needsContact = /contact|reach out|directly|get in touch|connect/i.test(text);
  if (needsContact) {
    html += `<div style="margin-top:10px;"><button onclick="openModal()" style="background:linear-gradient(135deg,#1a3a5c,#2563a8);color:white;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">📬 Send William a message</button></div>`;
  }
  return html;
}

function addMessage(role, htmlContent) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarHtml = role === 'bot'
    ? `<div class="msg-avatar">${MINI_AVATAR}</div>`
    : `<div class="msg-avatar">You</div>`;
  div.innerHTML = `${avatarHtml}<div class="bubble">${htmlContent}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (role === 'bot') speak(htmlContent);
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function askFAQ(key) {
  const item = FAQ[key];
  addMessage('user', item.userText);
  showTyping();
  await new Promise(r => setTimeout(r, 600));
  removeTyping();
  addMessage('bot', item.answer);
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  showTyping();
  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('bot', formatClaudeReply(reply));
  } catch(e) {
    removeTyping();
    addMessage('bot', `<p>I don't have a specific answer for that one. Let me connect you with William directly — he'll get back to you personally.</p>`);
    setTimeout(() => openModal(text), 400);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function addMessageSilent(role, htmlContent) {
  const msgs = document.getElementById('messages');

window.addEventListener('load', () => {
  addMessageSilent('bot', `<p>👋 Hi! I'm William's career assistant, here to help HR professionals and hiring managers learn more about his background.</p><p>Tap a quick question below, or type your own. I'll answer using real examples from William's 15-year banking career — and if I don't have the answer, I'll connect you to him directly.</p>`);
  initCanvas();
  // Load EmailJS
  const ejsScript = document.createElement('script');
  ejsScript.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  ejsScript.onload = () => {
    emailjs.init({ publicKey: 'or0DoNm7C3Z6EEZK2' });
    console.log('EmailJS ready');
  };
  document.head.appendChild(ejsScript);
});

/* ── MODAL CONTROLS ── */
function openModal(prefillQuestion) {
  document.getElementById('modalOverlay').classList.add('visible');
  document.getElementById('modalForm').style.display = 'block';
  document.getElementById('modalSuccess').style.display = 'none';
  document.getElementById('inputName').value = '';
  document.getElementById('inputEmail').value = '';
  document.getElementById('inputCompany').value = '';
  // Pre-fill question if provided
  const qField = document.getElementById('inputQuestion');
  if (qField) qField.value = prefillQuestion || '';
  // Update modal subtitle based on context
  const subtitle = document.getElementById('modalSubtitle');
  if (subtitle) {
    subtitle.textContent = prefillQuestion
      ? 'Your question has been noted. Leave your details and William will answer you directly.'
      : 'Leave your details and William will reach out to you directly.';
  }
  setTimeout(() => document.getElementById('inputName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

// Close on overlay click
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
});

async function submitContact() {
  const name    = document.getElementById('inputName').value.trim();
  const email   = document.getElementById('inputEmail').value.trim();
  const company = document.getElementById('inputCompany').value.trim();

  if (!name || !email) {
    alert('Please enter at least your name and email.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const question = document.getElementById('inputQuestion')?.value.trim() || '';
